name: Build All LaTeX Documents

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Presentazione/**'
      - 'Riassunto/**'
      - 'Tesi/**'
      - 'Article/**'
      - '.github/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 'Checkout repository' 
      uses: actions/checkout@v4

    # --- 1. COMPILAZIONE PRESENTAZIONE ---
    - name: 'Compile 1 - Presentazione (Slides)' 
      uses: xu-cheng/latex-action@v3
      with:
        working_directory: Presentazione
        root_file: main.tex
        args: -pdflua -interaction=nonstopmode -jobname=Presentazione

    # --- 2. COMPILAZIONE RIASSUNTO ---
    - name: 'Compile 2 - Riassunto' 
      uses: xu-cheng/latex-action@v3
      with:
        working_directory: Riassunto
        root_file: main.tex
        args: -pdflua -interaction=nonstopmode -jobname=Riassunto

    # --- 3. COMPILAZIONE TESI ---
    - name: 'Compile 3 - Tesi' 
      uses: xu-cheng/latex-action@v3
      with:
        working_directory: Tesi
        root_file: main.tex
        args: -pdflua -interaction=nonstopmode -jobname=Tesi

    # --- 4. COMPILAZIONE ARTICLE ---
    - name: 'Compile 4 - Article'
      uses: xu-cheng/latex-action@v3
      with:
        working_directory: Article
        root_file: main.tex
        args: -pdflua -interaction=nonstopmode -jobname=Article

    # --- 5. PUSH DEI PDF SUL BRANCH pdf-release ---
    - name: 'Push PDFs to pdf-release branch'
      run: |
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"

        # Salva i PDF in /tmp prima di cambiare branch
        cp Presentazione/Presentazione.pdf /tmp/Presentazione.pdf
        cp Riassunto/Riassunto.pdf /tmp/Riassunto.pdf
        cp Tesi/Tesi.pdf /tmp/Tesi.pdf
        cp Article/Article.pdf /tmp/Article.pdf

        # Passa al branch pdf-release (crea orphan al primo run, checkout negli altri)
        git fetch origin
        git checkout pdf-release 2>/dev/null || git checkout --orphan pdf-release

        # Rimuovi tutto e metti solo i PDF
        git rm -rf . --quiet 2>/dev/null || true
        mv /tmp/Presentazione.pdf .
        mv /tmp/Riassunto.pdf .
        mv /tmp/Tesi.pdf .
        mv /tmp/Article.pdf .

        git add *.pdf
        git diff --staged --quiet || git commit -m "Auto-update PDFs [skip ci]"
        git push origin pdf-release
    
    # --- 6. UPLOAD ARTIFACTS (Backup) ---
    - name: 'Upload all PDFs as artifacts'
      uses: actions/upload-artifact@v4
      with:
        name: All-Documents-PDF
        path: |
          Presentazione/*.pdf
          Riassunto/*.pdf
          Tesi/*.pdf
          Article/*.pdf
